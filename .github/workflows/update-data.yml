name: Update IPO data

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch IPO data
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: node fetch_ipos.js

      - name: Commit data.json
        run: |
          git config user.name  "ipo-bot"
          git config user.email "ipo-bot@users.noreply.github.com"
          git add data.json
          git diff --quiet --staged || git commit -m "chore: update data $(date -u +%F)"
          git push
